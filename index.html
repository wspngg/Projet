<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SALLE 13 — Ne regarde pas derrière toi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap');

  :root {
    --blood: #8b0000;
    --dark: #050505;
    --fog: #1a1a1a;
    --pale: #c8bfa8;
    --flicker: #d4c97a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--pale);
    font-family: 'Special Elite', cursive;
    overflow: hidden;
    height: 100vh;
    cursor: none;
    user-select: none;
  }

  /* CUSTOM CURSOR */
  #cursor {
    position: fixed;
    width: 20px; height: 20px;
    border: 1px solid rgba(200,191,168,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.05s;
    mix-blend-mode: difference;
  }

  /* SCANLINES */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* VIGNETTE */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.95) 100%);
    pointer-events: none;
    z-index: 999;
  }

  /* SCREENS */
  .screen {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 1s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ===== TITLE SCREEN ===== */
  #title-screen {
    background: var(--dark);
  }

  .glitch-title {
    font-family: 'Creepster', cursive;
    font-size: clamp(3rem, 8vw, 7rem);
    color: var(--blood);
    text-align: center;
    line-height: 1;
    text-shadow: 0 0 40px rgba(139,0,0,0.8);
    position: relative;
    animation: glitch 3s infinite;
  }

  @keyframes glitch {
    0%, 90%, 100% { transform: none; text-shadow: 0 0 40px rgba(139,0,0,0.8); }
    91% { transform: translateX(-3px) skewX(-2deg); text-shadow: -3px 0 #ff0000, 3px 0 #0000ff; }
    93% { transform: translateX(3px) skewX(2deg); text-shadow: 3px 0 #ff0000, -3px 0 #0000ff; }
    95% { transform: none; text-shadow: 0 0 40px rgba(139,0,0,0.8); }
    97% { transform: translateX(-2px); text-shadow: -2px 0 #ff0000; }
    99% { transform: translateX(2px); text-shadow: 2px 0 #0000ff; }
  }

  .subtitle {
    font-size: 1rem;
    color: rgba(200,191,168,0.4);
    letter-spacing: 0.5em;
    margin-top: 1rem;
    text-transform: uppercase;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 0.4; }
    96% { opacity: 0.1; }
    97% { opacity: 0.5; }
    98% { opacity: 0.15; }
    99% { opacity: 0.4; }
  }

  .start-btn {
    margin-top: 4rem;
    padding: 1rem 3rem;
    background: transparent;
    border: 1px solid var(--blood);
    color: var(--blood);
    font-family: 'Special Elite', cursive;
    font-size: 1.2rem;
    letter-spacing: 0.3em;
    cursor: none;
    text-transform: uppercase;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .start-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--blood);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
    z-index: -1;
  }

  .start-btn:hover { color: var(--dark); }
  .start-btn:hover::before { transform: scaleX(1); }

  .warning-text {
    position: absolute;
    bottom: 2rem;
    font-size: 0.7rem;
    color: rgba(200,191,168,0.2);
    letter-spacing: 0.2em;
  }

  /* ===== GAME SCREEN ===== */
  #game-screen {
    background: var(--dark);
    padding: 2rem;
  }

  #story-box {
    max-width: 700px;
    width: 100%;
    text-align: left;
    position: relative;
  }

  #room-name {
    font-family: 'Creepster', cursive;
    font-size: 2rem;
    color: var(--blood);
    margin-bottom: 1.5rem;
    text-shadow: 0 0 20px rgba(139,0,0,0.6);
    letter-spacing: 0.1em;
  }

  #narrative {
    font-size: 1rem;
    line-height: 1.9;
    color: var(--pale);
    min-height: 8em;
    position: relative;
  }

  #narrative::after {
    content: '█';
    animation: blink 1s step-end infinite;
    color: var(--blood);
  }
  @keyframes blink { 50% { opacity: 0; } }

  #choices {
    margin-top: 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .choice-btn {
    background: transparent;
    border: none;
    border-left: 2px solid rgba(139,0,0,0.3);
    padding: 0.7rem 1.5rem;
    color: rgba(200,191,168,0.6);
    font-family: 'Special Elite', cursive;
    font-size: 0.95rem;
    text-align: left;
    cursor: none;
    transition: all 0.2s;
    position: relative;
    letter-spacing: 0.05em;
  }

  .choice-btn::before {
    content: '›';
    position: absolute;
    left: 0.5rem;
    opacity: 0;
    color: var(--blood);
    transition: opacity 0.2s;
  }

  .choice-btn:hover {
    border-left-color: var(--blood);
    color: var(--pale);
    padding-left: 2rem;
  }

  .choice-btn:hover::before { opacity: 1; }

  /* HEALTH / SANITY */
  #hud {
    position: fixed;
    top: 2rem;
    right: 2rem;
    text-align: right;
    z-index: 20;
  }

  .hud-label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: rgba(200,191,168,0.3);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .hud-bar {
    width: 120px;
    height: 3px;
    background: rgba(139,0,0,0.2);
    margin-bottom: 0.8rem;
    position: relative;
  }

  .hud-fill {
    height: 100%;
    background: var(--blood);
    transition: width 1s ease;
    box-shadow: 0 0 8px var(--blood);
  }

  /* DEATH SCREEN */
  #death-screen {
    background: var(--dark);
  }

  .death-title {
    font-family: 'Creepster', cursive;
    font-size: clamp(4rem, 12vw, 10rem);
    color: var(--blood);
    animation: death-pulse 2s ease infinite;
  }

  @keyframes death-pulse {
    0%, 100% { text-shadow: 0 0 20px rgba(139,0,0,0.4); transform: scale(1); }
    50% { text-shadow: 0 0 80px rgba(139,0,0,1); transform: scale(1.02); }
  }

  .death-msg {
    font-size: 1rem;
    color: rgba(200,191,168,0.5);
    margin-top: 1.5rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .retry-btn {
    margin-top: 3rem;
    padding: 0.8rem 2.5rem;
    background: var(--blood);
    border: none;
    color: var(--pale);
    font-family: 'Special Elite', cursive;
    font-size: 1rem;
    letter-spacing: 0.2em;
    cursor: none;
    text-transform: uppercase;
    transition: opacity 0.3s;
  }
  .retry-btn:hover { opacity: 0.7; }

  /* WIN SCREEN */
  #win-screen { background: var(--dark); }

  .win-title {
    font-family: 'Creepster', cursive;
    font-size: clamp(3rem, 8vw, 6rem);
    color: #4a7c4a;
    text-shadow: 0 0 30px rgba(74,124,74,0.6);
  }

  /* JUMP SCARE */
  #jumpscare {
    position: fixed; inset: 0;
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    background: #fff;
    font-size: 20vw;
    animation: scare 0.4s ease;
  }
  @keyframes scare { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

  /* BLOOD DRIP */
  .drip {
    position: fixed;
    top: 0;
    width: 3px;
    background: linear-gradient(to bottom, var(--blood), transparent);
    border-radius: 0 0 3px 3px;
    animation: drip-fall linear forwards;
    pointer-events: none;
    z-index: 50;
  }
  @keyframes drip-fall {
    from { height: 0; opacity: 1; }
    to { height: var(--h); opacity: 0.6; }
  }

  /* NOISE OVERLAY */
  #noise {
    position: fixed; inset: 0;
    opacity: 0.03;
    pointer-events: none;
    z-index: 998;
    animation: noise-anim 0.2s infinite;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
  @keyframes noise-anim { 0% { background-position: 0 0; } 100% { background-position: 256px 256px; } }

  /* TYPEWRITER */
  .typing { overflow: hidden; white-space: pre-wrap; }

  /* SHAKE */
  @keyframes shake {
    0%, 100% { transform: translate(0); }
    10% { transform: translate(-8px, -4px) rotate(-1deg); }
    20% { transform: translate(8px, 4px) rotate(1deg); }
    30% { transform: translate(-6px, 6px); }
    40% { transform: translate(6px, -6px) rotate(-0.5deg); }
    50% { transform: translate(-4px, 4px); }
    60% { transform: translate(4px, -4px) rotate(0.5deg); }
  }

  .shake { animation: shake 0.5s ease; }
</style>
</head>
<body>

<div id="noise"></div>
<div id="cursor"></div>
<div id="jumpscare"></div>

<!-- BLOOD DRIPS (generated by JS) -->

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-label">Sanité</div>
  <div class="hud-bar"><div class="hud-fill" id="sanity-bar" style="width:100%"></div></div>
  <div class="hud-label">Vie</div>
  <div class="hud-bar"><div class="hud-fill" id="health-bar" style="width:100%"></div></div>
</div>

<!-- TITLE -->
<div class="screen" id="title-screen">
  <div class="glitch-title">SALLE 13</div>
  <div class="subtitle">Ne regarde pas derrière toi</div>
  <button class="start-btn" onclick="startGame()">Entrer</button>
  <div class="warning-text">⚠ CASQUE RECOMMANDÉ · LUMIÈRES ÉTEINTES</div>
</div>

<!-- GAME -->
<div class="screen hidden" id="game-screen">
  <div id="story-box">
    <div id="room-name"></div>
    <div id="narrative"></div>
    <div id="choices"></div>
  </div>
</div>

<!-- DEATH -->
<div class="screen hidden" id="death-screen">
  <div class="death-title">MORT</div>
  <div class="death-msg" id="death-msg">Tu n'aurais pas dû...</div>
  <button class="retry-btn" onclick="restartGame()">Recommencer</button>
</div>

<!-- WIN -->
<div class="screen hidden" id="win-screen">
  <div class="win-title">Tu as survécu.</div>
  <div class="death-msg" style="color:rgba(200,191,168,0.4);margin-top:1rem;">Pour l'instant.</div>
  <button class="retry-btn" style="background:#4a7c4a;margin-top:2rem" onclick="restartGame()">Fuir encore</button>
</div>

<script>
// ─── CURSOR ───────────────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// ─── AUDIO CONTEXT ────────────────────────────────────────────────────────────
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playNoise(freq, type, duration, vol = 0.3) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.start(); o.stop(audioCtx.currentTime + duration);
}

function playHeartbeat() {
  if (!audioCtx) return;
  [0, 0.15].forEach(t => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 60;
    g.gain.setValueAtTime(0, audioCtx.currentTime + t);
    g.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + t + 0.25);
    o.start(audioCtx.currentTime + t);
    o.stop(audioCtx.currentTime + t + 0.3);
  });
}

function playScare() {
  if (!audioCtx) return;
  [80, 120, 200, 350, 600].forEach((f, i) => {
    setTimeout(() => playNoise(f, 'sawtooth', 0.3, 0.5), i * 20);
  });
  playNoise(40, 'sine', 1.5, 0.8);
}

function playCreak() {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.8, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2) * 0.15;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass'; filter.frequency.value = 300 + Math.random() * 500;
  src.connect(filter); filter.connect(audioCtx.destination);
  src.start();
}

// ─── DRIPS ────────────────────────────────────────────────────────────────────
function spawnDrip() {
  const d = document.createElement('div');
  d.className = 'drip';
  d.style.left = Math.random() * 100 + 'vw';
  const h = 30 + Math.random() * 40;
  d.style.setProperty('--h', h + 'vh');
  d.style.animationDuration = (1.5 + Math.random() * 2) + 's';
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 4000);
}
setInterval(spawnDrip, 800);

// ─── JUMPSCARE ────────────────────────────────────────────────────────────────
const faces = ['👁️', '💀', '🩸', '👄', '🕷️'];
function jumpScare(cb) {
  const js = document.getElementById('jumpscare');
  js.textContent = faces[Math.floor(Math.random() * faces.length)];
  js.style.display = 'flex';
  playScare();
  document.body.classList.add('shake');
  setTimeout(() => {
    js.style.display = 'none';
    document.body.classList.remove('shake');
    if (cb) cb();
  }, 600);
}

// ─── TYPEWRITER ───────────────────────────────────────────────────────────────
function typeWrite(el, text, speed = 35, cb) {
  el.textContent = '';
  let i = 0;
  function next() {
    if (i < text.length) {
      el.textContent += text[i++];
      if (text[i - 1] !== ' ' && Math.random() < 0.05) playNoise(200 + Math.random() * 100, 'sine', 0.05, 0.02);
      setTimeout(next, speed + Math.random() * 20);
    } else if (cb) cb();
  }
  next();
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
let health = 100, sanity = 100;
let heartbeatInterval;

function updateHUD() {
  document.getElementById('health-bar').style.width = health + '%';
  document.getElementById('sanity-bar').style.width = sanity + '%';
  document.getElementById('sanity-bar').style.background = sanity < 30 ? '#4444ff' : '#8b0000';
}

function damage(h = 0, s = 0) {
  health = Math.max(0, health - h);
  sanity = Math.max(0, sanity - s);
  document.body.classList.add('shake');
  setTimeout(() => document.body.classList.remove('shake'), 500);
  updateHUD();
}

// ─── STORY DATA ───────────────────────────────────────────────────────────────
const rooms = {
  start: {
    name: "Le couloir",
    text: "Tu te réveilles. Le sol est froid. Une ampoule nue se balance au-dessus de toi, projetant une lumière jaunie qui pulse comme un cœur malade. Le couloir s'étend dans les deux sens — à gauche, une porte entrouverte laisse filtrer une lumière rouge sang. À droite, tu entends quelque chose... respirer.",
    choices: [
      { text: "Aller vers la porte rouge à gauche", next: "red_door", sc: false },
      { text: "Avancer vers la respiration à droite", next: "breathing", sc: false },
      { text: "Rester immobile et écouter", next: "listen", sc: false }
    ]
  },
  listen: {
    name: "Le couloir — silence",
    text: "Tu retiens ta respiration. La chose dans l'ombre s'arrête elle aussi. Pendant dix secondes... rien. Puis quelque chose de froid effleure ta nuque. Une voix murmure ton prénom dans ton oreille. Tu ne lui as jamais dit comment tu t'appelais.",
    choices: [
      { text: "Courir vers la porte rouge", next: "red_door", dmg: [10, 20] },
      { text: "Te retourner", next: "turn_around", sc: true }
    ]
  },
  turn_around: {
    name: "Erreur",
    text: "Il était là. Juste derrière toi. Tu n'avais pas le droit de regarder.",
    death: true,
    deathMsg: "Certaines choses ne peuvent pas être vues."
  },
  breathing: {
    name: "La source",
    text: "Tu avances vers la droite. La respiration s'intensifie à chaque pas — rauque, lourde, comme quelqu'un qui se retient de pleurer. Tu pousses une porte. Une chaise. Un miroir. Dans le reflet, quelqu'un est assis à ta place. Il te regarde. Quand tu bouges, il ne bouge pas.",
    choices: [
      { text: "Briser le miroir", next: "broken_mirror", dmg: [0, 15], sc: false },
      { text: "Parler à ton reflet", next: "talk_mirror", sc: false },
      { text: "Sortir de la pièce en reculant", next: "red_door", dmg: [5, 5] }
    ]
  },
  talk_mirror: {
    name: "Le miroir parle",
    text: "Tu ouvres la bouche. Ton reflet pose un doigt sur ses lèvres. Puis il lève un doigt. Puis deux. Puis il pointe derrière toi. Tu fais volte-face — rien. Quand tu te retournes vers le miroir, il n'y a plus de reflet du tout. Juste le vide.",
    choices: [
      { text: "Aller vers la porte rouge", next: "red_door", dmg: [0, 25] }
    ]
  },
  broken_mirror: {
    name: "Sept ans",
    text: "L'éclatement résonne comme un cri. Les éclats jonchent le sol. Dans chaque fragment, tu vois un endroit différent — une cave, un puits, une forêt la nuit. Et dans tous, une silhouette t'observe. Du sang perle de ta main. Tu ramasses un éclat de verre.",
    choices: [
      { text: "Continuer avec l'éclat de verre", next: "red_door", item: "glass" }
    ]
  },
  red_door: {
    name: "La porte rouge",
    text: "La poignée est chaude au toucher. Presque vivante. Tu pousses la porte. Une chambre d'enfant. Des dessins au crayon tapissent les murs — des centaines de fois la même maison. La même porte. Cette porte. Au centre de la pièce, un berceau. Quelque chose bouge à l'intérieur.",
    choices: [
      { text: "Regarder dans le berceau", next: "crib", sc: false },
      { text: "Examiner les dessins sur les murs", next: "drawings", sc: false },
      { text: "Rebrousser chemin — tu ne veux pas savoir", next: "no_exit", sc: false }
    ]
  },
  no_exit: {
    name: "Il n'y a pas de retour",
    text: "Tu te retournes. La porte par laquelle tu es entré a disparu. À la place, un mur. Sur le mur, un dessin — toi, ici, en train de lire ce texte.",
    choices: [
      { text: "Regarder dans le berceau", next: "crib" },
      { text: "Examiner les dessins", next: "drawings" }
    ]
  },
  drawings: {
    name: "Les dessins",
    text: "Tu t'approches des murs. Les dessins sont d'une précision troublante pour un enfant. Chaque maison a une porte rouge. Chaque porte rouge... te montre, toi, en train de l'ouvrir. Sur le dernier dessin, le plus récent encore humide, tu vois une chambre d'enfant. Un berceau. Et une silhouette penchée dessus. Ça ressemble à toi. Ça est toi.",
    choices: [
      { text: "Regarder dans le berceau maintenant", next: "crib", dmg: [0, 20] }
    ]
  },
  crib: {
    name: "Le berceau",
    text: "Tu t'approches. Le mouvement s'arrête. Tu regardes à l'intérieur. Un vieux téléphone à cadran. Il sonne. La sonnerie est un cri humain. Tu hésites. Il sonne. Il sonne. Il sonne.",
    choices: [
      { text: "Décrocher", next: "phone", sc: false },
      { text: "Ignorer", next: "ignore_phone", sc: false }
    ]
  },
  ignore_phone: {
    name: "Le téléphone ne s'arrête pas",
    text: "Il sonne. Il sonne pendant deux minutes. Cinq. Dix. L'ampoule explose. Dans le noir total, la sonnerie devient une voix — la tienne — qui répète une phrase que tu n'as jamais dite. Puis quelque chose te saisit la cheville.",
    death: true,
    deathMsg: "Tu aurais dû décrocher.",
    sc: true
  },
  phone: {
    name: "La voix",
    text: "Tu décroches. Un souffle. Puis une voix de vieille femme : « Ne va pas au sous-sol. » La ligne grésille. « Ne va pas au sous-sol. » Et soudain, dans le plancher, tu remarques une trappe que tu n'avais pas vue.",
    choices: [
      { text: "Ouvrir la trappe — descendre au sous-sol", next: "basement", sc: false },
      { text: "Obéir à la voix — chercher une autre issue", next: "other_exit", sc: false }
    ]
  },
  other_exit: {
    name: "La fenêtre",
    text: "Il y a une fenêtre. Elle donne sur... l'intérieur de la même pièce. Tu te vois de dos, debout près de la fenêtre. Ton reflet se retourne. Il n'a pas ton visage.",
    choices: [
      { text: "Descendre au sous-sol — c'est la seule issue", next: "basement", dmg: [0, 15] }
    ]
  },
  basement: {
    name: "Le sous-sol",
    text: "Les marches craquent sous ton poids. L'obscurité est totale. Tu utilises ton téléphone comme lampe — la batterie est à 1%. La pièce est remplie de chaises retournées. Toutes orientées vers un point central. Au centre : une table. Sur la table : une photo de toi. Prise ce soir. Ici.",
    choices: [
      { text: "Prendre la photo", next: "take_photo", dmg: [10, 30] },
      { text: "Remonter précipitamment", next: "run_up", sc: false }
    ]
  },
  run_up: {
    name: "La fuite",
    text: "Tu remontes les marches quatre à quatre. En haut, la trappe est fermée de l'extérieur. Quelqu'un frappe depuis en bas. Non — quelque chose frappe depuis en haut. Les deux en même temps.",
    choices: [
      { text: "Forcer la trappe", next: "force_hatch", dmg: [20, 10] },
      { text: "Rester immobile dans le noir", next: "still_dark", dmg: [0, 40] }
    ]
  },
  still_dark: {
    name: "Dans le noir",
    text: "Tu attends. Les frappements s'arrêtent. Puis ta main touche quelque chose de chaud dans l'obscurité. Quelque chose qui respire.",
    death: true,
    deathMsg: "L'obscurité n'était pas vide.",
    sc: true
  },
  force_hatch: {
    name: "La sortie",
    text: "La trappe cède. Tu te propulses dans la chambre d'enfant. Elle a changé — les dessins ont disparu, remplacés par un seul mot gravé dans le plâtre, répété mille fois : SORS. Une porte que tu n'avais pas remarquée s'ouvre devant toi. De la lumière naturelle en filtre.",
    choices: [
      { text: "Traverser la porte vers la lumière", next: "escape" }
    ]
  },
  take_photo: {
    name: "La photo",
    text: "Tu la prends. Au dos, une adresse et une date — demain. La photo tombe de tes mains quand tu la retournes. Ce n'est pas ton visage sur la photo. C'est celui de quelqu'un debout derrière toi, en ce moment même.",
    death: true,
    deathMsg: "Tu n'aurais pas dû regarder la photo.",
    sc: true
  },
  escape: {
    win: true
  }
};

// ─── ENGINE ───────────────────────────────────────────────────────────────────
let currentRoom = 'start';

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function goToRoom(key) {
  const room = rooms[key];
  currentRoom = key;

  if (room.death) {
    if (room.sc) {
      jumpScare(() => triggerDeath(room.deathMsg));
    } else {
      triggerDeath(room.deathMsg);
    }
    return;
  }

  if (room.win) {
    triggerWin();
    return;
  }

  if (room.sc) {
    jumpScare(() => renderRoom(room));
  } else {
    renderRoom(room);
  }
}

function renderRoom(room) {
  const nameEl = document.getElementById('room-name');
  const narEl = document.getElementById('narrative');
  const choicesEl = document.getElementById('choices');

  nameEl.textContent = room.name;
  choicesEl.innerHTML = '';
  narEl.textContent = '';

  playCreak();
  setTimeout(playHeartbeat, 500);

  typeWrite(narEl, room.text, 30, () => {
    if (room.choices) {
      room.choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c.text;
        btn.onclick = () => {
          initAudio();
          playNoise(300, 'sine', 0.2, 0.1);
          if (c.dmg) damage(c.dmg[0], c.dmg[1]);
          if (c.sc) {
            jumpScare(() => {
              if (health <= 0 || sanity <= 0) triggerDeath("Tu as succombé à la peur.");
              else goToRoom(c.next);
            });
          } else {
            if (health <= 0 || sanity <= 0) triggerDeath("Tu as succombé à la peur.");
            else goToRoom(c.next);
          }
        };
        choicesEl.appendChild(btn);
      });
    }
  });
}

function triggerDeath(msg) {
  clearInterval(heartbeatInterval);
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('death-msg').textContent = msg || "Tu n'aurais pas dû...";
  showScreen('death-screen');
  playNoise(80, 'sawtooth', 2, 0.4);
}

function triggerWin() {
  clearInterval(heartbeatInterval);
  document.getElementById('hud').classList.add('hidden');
  showScreen('win-screen');
  playNoise(220, 'sine', 3, 0.2);
}

function startGame() {
  initAudio();
  health = 100; sanity = 100;
  updateHUD();
  document.getElementById('hud').classList.remove('hidden');
  showScreen('game-screen');

  heartbeatInterval = setInterval(() => {
    if (sanity < 40) playHeartbeat();
  }, 1500);

  goToRoom('start');
}

function restartGame() {
  startGame();
}

// Random ambient heartbeat on title
setInterval(() => {
  if (!audioCtx) return;
  if (document.getElementById('title-screen').classList.contains('hidden')) return;
  if (Math.random() < 0.3) playNoise(40 + Math.random() * 20, 'sine', 0.5, 0.05);
}, 3000);

// Random scare sound during game
setInterval(() => {
  if (!audioCtx) return;
  if (document.getElementById('game-screen').classList.contains('hidden')) return;
  if (Math.random() < 0.15) playCreak();
}, 8000);
</script>
